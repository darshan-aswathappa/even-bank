<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Connect your bank · Even Bank</title>
    <!-- Plaid Link (only used in live mode). NOTE: Plaid serves this as a
         mutable "stable" URL and does NOT support Subresource Integrity (SRI) —
         a pinned integrity hash would break Link when Plaid updates the file.
         This is the one script we intentionally load without SRI, per Plaid's
         requirement to always load the latest from their CDN. -->
    <script src="https://cdn.plaid.com/link/v2/stable/link-initialize.js"></script>
    <style>
      /* Even phone-side design tokens (dark). Glasses green is NEVER used here. */
      :root {
        --bg: #111111;
        --surface: #1a1a1a;
        --text: #ffffff;
        --text-dim: #8a8a8a;
        --accent: #fef991;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--bg);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        letter-spacing: -0.01em;
        padding: 20px;
      }
      .card {
        background: var(--surface);
        border-radius: 16px;
        padding: 32px 24px;
        max-width: 360px;
        width: 100%;
        text-align: center;
      }
      h1 { font-size: 24px; font-weight: 600; margin: 0 0 8px; }
      p { color: var(--text-dim); font-size: 16px; line-height: 1.4; margin: 0 0 24px; }
      button {
        appearance: none;
        border: none;
        border-radius: 10px;
        background: var(--accent);
        color: #111;
        font-size: 16px;
        font-weight: 600;
        padding: 14px 20px;
        width: 100%;
        cursor: pointer;
      }
      button:disabled { opacity: 0.4; cursor: default; }
      .status { margin-top: 16px; font-size: 13px; color: var(--text-dim); min-height: 18px; }
      .ok { color: var(--accent); }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Connect your bank</h1>
      <p id="subtitle">Securely link your account with Plaid to see your balance and transactions on your glasses.</p>
      <button id="connect" disabled>Loading…</button>
      <div class="status" id="status"></div>
    </div>

    <script>
      const btn = document.getElementById("connect");
      const statusEl = document.getElementById("status");
      const subtitle = document.getElementById("subtitle");

      function setStatus(msg, ok) {
        statusEl.textContent = msg;
        statusEl.className = "status" + (ok ? " ok" : "");
      }

      async function init() {
        try {
          const res = await fetch("/api/link/token/create", { method: "POST" });
          const data = await res.json();

          if (data.mode === "mock") {
            subtitle.textContent =
              "Running in mock mode — no real bank connection needed. Your glasses already show demo data.";
            btn.textContent = "Mock mode active";
            btn.disabled = true;
            setStatus("Add Plaid keys to server/.env to connect a real bank.");
            return;
          }

          const handler = Plaid.create({
            token: data.link_token,
            onSuccess: async (publicToken) => {
              setStatus("Linking…");
              const ex = await fetch("/api/item/public_token/exchange", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ public_token: publicToken }),
              });
              if (ex.ok) {
                setStatus("Connected. Your balance is now on your glasses.", true);
                btn.textContent = "Connected";
                btn.disabled = true;
              } else {
                setStatus("Link failed — please try again.");
              }
            },
            onExit: (err) => {
              if (err) setStatus("Connection cancelled.");
            },
          });

          btn.textContent = "Connect a bank";
          btn.disabled = false;
          btn.addEventListener("click", () => handler.open());
        } catch (e) {
          setStatus("Could not reach the server. Is it running?");
        }
      }

      init();
    </script>
  </body>
</html>
