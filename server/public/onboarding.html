<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Connect your bank · Even Bank</title>
    <!-- Plaid Link (live mode). NOTE: Plaid serves this as a mutable "stable"
         URL and does NOT support Subresource Integrity — a pinned hash would
         break Link when Plaid updates it. Intentionally loaded without SRI. -->
    <script src="https://cdn.plaid.com/link/v2/stable/link-initialize.js"></script>
    <style>
      :root {
        --bg: #111111;
        --surface: #1a1a1a;
        --text: #ffffff;
        --text-dim: #8a8a8a;
        --accent: #fef991;
        --border: #2a2a2a;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
        background: var(--bg); color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        letter-spacing: -0.01em; padding: 20px;
      }
      .card { background: var(--surface); border-radius: 16px; padding: 32px 24px; max-width: 380px; width: 100%; text-align: center; }
      h1 { font-size: 24px; font-weight: 600; margin: 0 0 8px; }
      p { color: var(--text-dim); font-size: 15px; line-height: 1.45; margin: 0 0 20px; }
      input {
        width: 100%; padding: 13px 14px; margin-bottom: 12px; border-radius: 10px;
        border: 1px solid var(--border); background: #0d0d0d; color: var(--text); font-size: 16px;
      }
      input::placeholder { color: #666; }
      button {
        appearance: none; border: none; border-radius: 10px; background: var(--accent); color: #111;
        font-size: 16px; font-weight: 600; padding: 14px 20px; width: 100%; cursor: pointer;
      }
      button:disabled { opacity: 0.4; cursor: default; }
      .status { margin-top: 14px; font-size: 13px; color: var(--text-dim); min-height: 18px; }
      .ok { color: var(--accent); }
      .hidden { display: none; }
      .code-input { text-transform: uppercase; letter-spacing: 0.15em; text-align: center; font-size: 20px; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1 id="title">Even Bank</h1>
      <p id="subtitle">Loading…</p>

      <!-- Step 1: sign in -->
      <div id="emailStep" class="hidden">
        <input id="email" type="email" placeholder="you@example.com" autocomplete="email" />
        <button id="emailBtn">Send sign-in link</button>
      </div>

      <!-- Step 2: enter the code shown on the glasses -->
      <div id="codeStep" class="hidden">
        <input id="code" class="code-input" placeholder="XXXX-XXXX" autocomplete="off" />
        <button id="codeBtn">Pair glasses</button>
      </div>

      <!-- Step 3: connect a bank -->
      <div id="linkStep" class="hidden">
        <button id="linkBtn">Connect a bank</button>
      </div>

      <div class="status" id="status"></div>
    </div>

    <script>
      const $ = (id) => document.getElementById(id);
      const show = (id) => $(id).classList.remove("hidden");
      const hide = (id) => $(id).classList.add("hidden");
      const setTitle = (t) => ($("title").textContent = t);
      const setSubtitle = (t) => ($("subtitle").textContent = t);
      const setStatus = (msg, ok) => {
        $("status").textContent = msg || "";
        $("status").className = "status" + (ok ? " ok" : "");
      };

      async function api(path, body) {
        const res = await fetch(path, {
          method: body ? "POST" : "GET",
          headers: body ? { "Content-Type": "application/json" } : {},
          body: body ? JSON.stringify(body) : undefined,
        });
        let data = {};
        try { data = await res.json(); } catch {}
        return { ok: res.ok, status: res.status, data };
      }

      function showSignIn() {
        setTitle("Sign in");
        setSubtitle("We'll email you a secure link to sign in.");
        hide("codeStep"); hide("linkStep"); show("emailStep");
      }
      function showEnterCode() {
        setTitle("Pair your glasses");
        setSubtitle("Enter the code shown on your glasses display.");
        hide("emailStep"); hide("linkStep"); show("codeStep");
      }
      function showConnectBank() {
        setTitle("Connect your bank");
        setSubtitle("Securely link your account with Plaid.");
        hide("emailStep"); hide("codeStep"); show("linkStep");
      }
      function showDone(msg) {
        setTitle("All set");
        setSubtitle(msg);
        hide("emailStep"); hide("codeStep"); hide("linkStep");
      }

      // --- Step 1: email magic-link ---
      $("emailBtn").addEventListener("click", async () => {
        const email = $("email").value.trim();
        if (!email) return setStatus("Enter your email.");
        $("emailBtn").disabled = true;
        const r = await api("/api/auth/magic-link", { email });
        $("emailBtn").disabled = false;
        if (r.ok) setStatus("Check your email for a sign-in link.", true);
        else setStatus("Could not send the link. Try again.");
      });

      // --- Step 2: approve the glasses code ---
      $("codeBtn").addEventListener("click", async () => {
        const code = $("code").value.trim();
        if (!code) return setStatus("Enter the code from your glasses.");
        $("codeBtn").disabled = true;
        const r = await api("/api/device/approve", { user_code: code });
        $("codeBtn").disabled = false;
        if (!r.ok) {
          setStatus(r.status === 404 ? "Code not found or expired." : "Could not pair. Try again.");
          return;
        }
        if (r.data.needsBankLink) showConnectBank();
        else showDone("Your glasses are paired. Return to your glasses.");
      });

      // --- Step 3: Plaid Link ---
      $("linkBtn").addEventListener("click", async () => {
        $("linkBtn").disabled = true;
        const r = await api("/api/link/token/create", {});
        if (!r.ok) { setStatus("Could not start linking."); $("linkBtn").disabled = false; return; }

        if (r.data.mode === "mock") {
          // No real Plaid in mock mode — finish the pairing directly.
          await api("/api/item/public_token/exchange", {});
          showDone("Mock bank linked. Return to your glasses.");
          return;
        }

        const handler = Plaid.create({
          token: r.data.link_token,
          onSuccess: async (publicToken) => {
            setStatus("Linking…");
            const ex = await api("/api/item/public_token/exchange", { public_token: publicToken });
            if (ex.ok) showDone("Connected. Return to your glasses.");
            else setStatus("Link failed — try again.");
          },
          onExit: () => { $("linkBtn").disabled = false; },
        });
        handler.open();
      });

      // --- Decide which step to show on load ---
      (async () => {
        const me = await api("/api/auth/me");
        if (me.data.authenticated) showEnterCode();
        else showSignIn();
      })();
    </script>
  </body>
</html>
