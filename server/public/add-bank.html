<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Add a bank · Even Bank</title>
    <!-- Plaid Link (live mode). NOTE: Plaid serves this as a mutable "stable"
         URL and does NOT support Subresource Integrity — a pinned hash would
         break Link when Plaid updates it. Intentionally loaded without SRI. -->
    <script src="https://cdn.plaid.com/link/v2/stable/link-initialize.js"></script>
    <style>
      :root {
        --bg: #111111;
        --surface: #1a1a1a;
        --text: #ffffff;
        --text-dim: #8a8a8a;
        --accent: #fef991;
        --border: #2a2a2a;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
        background: var(--bg); color: var(--text);
        font-family: "FK Grotesk Neue", "Source Han Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        padding: 20px;
      }
      .card { background: var(--surface); border-radius: 16px; padding: 32px 24px; max-width: 380px; width: 100%; text-align: center; }
      h1 { font-size: 24px; font-weight: 600; letter-spacing: -0.02em; margin: 0 0 8px; }
      p { color: var(--text-dim); font-size: 16px; font-weight: 400; letter-spacing: -0.01em; line-height: 1.5; margin: 0 0 24px; }
      button {
        appearance: none; border: none; border-radius: 12px; background: var(--accent); color: #232323;
        font-family: inherit; font-size: 16px; font-weight: 600; letter-spacing: -0.01em; padding: 16px 24px; width: 100%; cursor: pointer;
      }
      button:disabled { opacity: 0.4; cursor: default; }
      .status { margin-top: 14px; font-size: 13px; color: var(--text-dim); min-height: 18px; }
      .ok { color: var(--accent); }
      .hidden { display: none; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1 id="title">Even Bank</h1>
      <p id="subtitle">Loading…</p>

      <div id="linkStep" class="hidden">
        <button id="linkBtn">Connect a bank</button>
      </div>

      <div class="status" id="status"></div>
    </div>

    <script src="/add-bank.js"></script>
  </body>
</html>
